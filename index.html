/* ── SOM DE CAIXA REGISTRADORA ─────────────────────── */
function playCashRegister() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const play = (freq, start, dur, vol=0.3, type="sine") => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime+start);
      osc.frequency.exponentialRampToValueAtTime(freq*0.6, ctx.currentTime+start+dur);
      gain.gain.setValueAtTime(0, ctx.currentTime+start);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime+start+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+start+dur);
      osc.start(ctx.currentTime+start);
      osc.stop(ctx.currentTime+start+dur+0.05);
    };
    play(1318, 0,    0.12, 0.25);
    play(1047, 0.06, 0.12, 0.2);
    play(1568, 0.12, 0.25, 0.3);
    play(2093, 0.14, 0.2,  0.15);
    // coin noise
    const bufSz = Math.floor(ctx.sampleRate * 0.08);
    const buf   = ctx.createBuffer(1, bufSz, ctx.sampleRate);
    const data  = buf.getChannelData(0);
    for(let i=0;i<bufSz;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(bufSz*0.15));
    const noise = ctx.createBufferSource();
    const flt   = ctx.createBiquadFilter();
    const gn    = ctx.createGain();
    flt.type = "bandpass"; flt.frequency.value = 5000; flt.Q.value = 2;
    noise.buffer = buf;
    noise.connect(flt); flt.connect(gn); gn.connect(ctx.destination);
    gn.gain.setValueAtTime(0.15, ctx.currentTime+0.18);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    noise.start(ctx.currentTime+0.18);
    noise.stop(ctx.currentTime+0.45);
  } catch(e) {}
}

/* ── NOTIFICAÇÕES ──────────────────────────────────── */
async function requestNotifPermission() {
  if (!("Notification" in window)) return false;
  if (Notification.permission === "granted") return true;
  const p = await Notification.requestPermission();
  return p === "granted";
}

function showNotif(title, body) {
  if (Notification.permission !== "granted") return;
  try { new Notification(title, { body, icon:"icon-192.png", badge:"icon-192.png", vibrate:[200,100,200] }); } catch(e){}
}

function scheduleDailyNotif(getTodayData) {
  const now    = new Date();
  const target = new Date();
  target.setHours(NOTIF_HOUR, NOTIF_MINUTE, 0, 0);
  if (target <= now) target.setDate(target.getDate() + 1);
  const ms = target - now;
  return setTimeout(() => {
    const d = getTodayData();
    showNotif(
      `📊 Caixa do dia — ${new Date().toLocaleDateString("pt-BR")}`,
      `Entradas: ${fmt(d.in)} | Saídas: ${fmt(d.out)} | Saldo: ${fmt(d.in - d.out)}`
    );
    scheduleDailyNotif(getTodayData);
  }, ms);
}

    userRef(user.uid).collection("settings").doc("main").set(patch,{merge:true});

        <div style={{background:`${G}18`,border:`1px solid ${G}44`,borderRadius:12,padding:"15px 16px"}}>
          <div style={{fontSize:10,color:G,marginBottom:6}}>Ticket médio</div>
          <div style={{fontSize:22,fontWeight:700,color:G}}>{fmt(sales?totalIn/sales:0)}</div>
          <div style={{fontSize:10,color:`${G}77`,marginTop:4}}>por transação</div>
        </div>
        <div style={{background:`${COR}14`,border:`1px solid ${COR}33`,borderRadius:12,padding:"15px 16px"}}>
          <div style={{fontSize:10,color:COR,marginBottom:6}}>Custos fixos/mês</div>
          <div style={{fontSize:22,fontWeight:700,color:COR}}>{fmt(totalFixed)}</div>
          <div style={{fontSize:10,color:`${COR}77`,marginTop:4}}>recorrente</div>
        </div>
      </div>

      {/* META */}
      <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div><div style={{fontSize:12,fontWeight:700}}>Meta de Faturamento</div><div style={{fontSize:10,color:MUT,marginTop:2}}>mín {fmt(goals.min)} · máx {fmt(goals.max)}</div></div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:20,fontWeight:700,color:goalPct>=100?G:goalPct>=minPct?YEL:R}}>{goalPct.toFixed(0)}%</div>
              <div style={{fontSize:10,color:MUT}}>{fmt(totalIn)}</div>
            </div>
            <button onClick={()=>{setTmp(goals);setEditG(!editG);}} style={GhBtn(editG?G:MUT,editG?G:BORD)}>{editG?"fechar":"editar"}</button>
          </div>
        </div>
        <div style={{position:"relative",marginBottom:16}}>
          <div style={{background:BORD,borderRadius:6,height:12,position:"relative"}}>
            <div style={{position:"absolute",top:0,left:0,height:"100%",width:`${goalPct}%`,background:goalPct>=100?G:goalPct>=minPct?`linear-gradient(90deg,${YEL},${G})`:`linear-gradient(90deg,${R},${R}99)`,borderRadius:6,transition:"width .6s"}}/>
            <div style={{position:"absolute",top:-3,left:`${minPct}%`,width:2,height:18,background:YEL}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:9,color:MUT,position:"relative"}}>
            <span>R$ 0</span>
            <span style={{position:"absolute",left:`${minPct}%`,transform:"translateX(-50%)",color:YEL,fontWeight:700}}>mín</span>
            <span>{fmt(goals.max)}</span>
          </div>
        </div>
        {editG&&(
          <div style={{borderTop:`1px solid ${BORD}`,paddingTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><div style={{fontSize:10,color:MUT,marginBottom:4}}>Meta mínima (R$)</div><input type="number" value={tmp.min} onChange={e=>setTmp(p=>({...p,min:+e.target.value}))} style={IS}/></div>
            <div><div style={{fontSize:10,color:MUT,marginBottom:4}}>Meta máxima (R$)</div><input type="number" value={tmp.max} onChange={e=>setTmp(p=>({...p,max:+e.target.value}))} style={IS}/></div>
            <button onClick={()=>{updGoals(tmp);setEditG(false);}} style={{...GBtn(G,"10px"),gridColumn:"1/-1"}}>Salvar Metas</button>
          </div>
        )}
      </div>

      {/* GRÁFICO */}
      <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,padding:"14px 14px 8px"}}>
        <div style={{fontSize:11,fontWeight:700,marginBottom:12}}>Faturamento 30 dias</div>
        <ResponsiveContainer width="100%" height={150}>
          <AreaChart data={daily}>
            <defs>
              <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={G} stopOpacity={.5}/><stop offset="95%" stopColor={G} stopOpacity={.02}/></linearGradient>
              <linearGradient id="gC" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={COR} stopOpacity={.5}/><stop offset="95%" stopColor={COR} stopOpacity={.02}/></linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke={BORD} vertical={false}/>
            <XAxis dataKey="label" tick={{fill:MUT,fontSize:9}} axisLine={false} tickLine={false} interval={5}/>
            <YAxis tick={{fill:MUT,fontSize:9}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
            <Tooltip content={<Tip/>}/>
            <Area type="monotone" dataKey="entrada" name="Entrada" stroke={G} strokeWidth={2} fill="url(#gG)" dot={false}/>
            <Area type="monotone" dataKey="saida" name="Saída" stroke={COR} strokeWidth={2} fill="url(#gC)" dot={false}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>

      {/* POR OPERAÇÃO */}
      <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,padding:"14px 16px"}}>
        <div style={{fontSize:11,fontWeight:700,marginBottom:12}}>Por operação</div>
        {opBreak.every(o=>o.total===0)
          ? <div style={{color:MUT,fontSize:12,textAlign:"center",padding:"20px 0"}}>Abra cada operação e registre transações!</div>
          : opBreak.map(o=>{const max=Math.max(...opBreak.map(x=>x.total),1);return(
            <div key={o.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                <span style={{color:o.color}}>{o.icon} {o.name}</span>
                <span style={{fontWeight:700}}>{fmt(o.total)}</span>
              </div>
              <div style={{background:BORD,borderRadius:3,height:5}}>
                <div style={{height:"100%",width:`${o.total/max*100}%`,background:o.color,borderRadius:3,transition:"width .4s"}}/>
              </div>
            </div>
          );})}
      </div>

      {/* ÚLTIMAS */}
      <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${BORD}`,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:12,fontWeight:700}}>Últimas transações</span>
          <span style={{fontSize:10,color:MUT}}>{txs.length} total</span>
        </div>
        {txs.length===0
          ? <div style={{padding:28,textAlign:"center",color:MUT,fontSize:12}}>Nenhuma transação ainda</div>
          : txs.slice(0,6).map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:`1px solid ${BORD}18`}}>
              <div style={{width:26,height:26,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,background:t.type==="entrada"?`${G}18`:`${COR}18`,color:t.type==="entrada"?G:COR,flexShrink:0}}>{t.type==="entrada"?"↑":"↓"}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.description||t.category||"—"}</div>
                <div style={{fontSize:10,color:MUT,marginTop:1}}>{OPS[t.op]?.name} · {t.category}</div>
              </div>
              <div style={{fontWeight:700,fontSize:13,color:t.type==="entrada"?G:COR,flexShrink:0}}>{t.type==="entrada"?"+":"-"}{fmt(t.value)}</div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   OPERAÇÃO TAB (Ads / E-com / X1)
══════════════════════════════════════════════════════ */
function OpTab({opId,txs,onAdd,onDel}){
  const cfg = OPS[opId];
  const [aiIn,setAiIn]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [showAI,setShowAI]=useState(false);
  const [filter,setFilter]=useState("todos");
  const empty = {type:"entrada",value:"",category:"",description:"",date:toDay(),paymentMethod:"Pix",quantity:"",unitValue:""};
  const [form,setForm]=useState(empty);
  const F=(k,v)=>setForm(p=>({...p,[k]:v}));
  const [err,setErr]=useState("");

  const calcVal=(qty,unit)=>{const q=parseFloat(qty),u=parseFloat(unit);if(q>0&&u>0)F("value",(q*u).toFixed(2));};

  const submit=()=>{
    const v=parseFloat(form.value);
    if(!v||isNaN(v)){setErr("Preencha o valor!");return;}
    onAdd({type:form.type,value:v,category:form.category||(form.type==="entrada"?cfg.catIn[0]:cfg.catOut[0]),description:form.description,date:form.date,paymentMethod:form.paymentMethod});
    setForm(empty);setErr("");
  };

  const parseAI=async()=>{
    if(!aiIn.trim()||aiLoad)return;
    setAiLoad(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:250,
        system:`Interprete transações em português informal para "${cfg.name}". Retorne APENAS JSON sem markdown.\nFormato: {"type":"entrada"ou"saida","value":número,"category":"cat","description":"desc","date":"YYYY-MM-DD","paymentMethod":"Pix"ou"Cartão Débito"ou"Outros"}\nCats entrada: ${cfg.catIn.join(",")} | saída: ${cfg.catOut.join(",")}\nHoje: ${toDay()}.`,
        messages:[{role:"user",content:aiIn}]
      })});
      const data=await res.json();
      const p=JSON.parse((data.content?.[0]?.text||"").trim());
      if(!p.type||!p.value)throw 0;
      onAdd(p);setAiIn("");setShowAI(false);
    }catch{setErr("IA não entendeu. Preencha manualmente.");}
    setAiLoad(false);
  };

  const totalIn=txs.filter(t=>t.type==="entrada").reduce((a,t)=>a+t.value,0);
  const totalOut=txs.filter(t=>t.type==="saida").reduce((a,t)=>a+t.value,0);
  const filtered=txs.filter(t=>filter==="todos"||t.type===filter);
  const cats=form.type==="entrada"?cfg.catIn:cfg.catOut;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* HEADER OP */}
      <div style={{background:`${cfg.color}18`,border:`1px solid ${cfg.color}44`,borderRadius:12,padding:"14px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{fontSize:24,color:cfg.color}}>{cfg.icon}</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:cfg.color}}>{cfg.name}</div>
            <div style={{fontSize:10,color:MUT,marginTop:2}}>{txs.length} transações</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {[{l:"Entradas",v:totalIn,c:G},{l:"Saídas",v:totalOut,c:COR},{l:"Lucro",v:totalIn-totalOut,c:(totalIn-totalOut)>=0?G:R}].map(s=>(
            <div key={s.l} style={{background:"#0f0f0f44",borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontSize:9,color:MUT,marginBottom:4}}>{s.l.toUpperCase()}</div>
              <div style={{fontSize:16,fontWeight:700,color:s.c}}>{fmt(s.v)}</div>
            </div>
          ))}
        </div>
      </div>

      {/* FORMULÁRIO MANUAL */}
      <div style={{background:CARD,border:`1px solid ${cfg.color}55`,borderLeft:`3px solid ${cfg.color}`,borderRadius:12,padding:"14px"}}>
        <div style={{fontSize:12,fontWeight:700,color:cfg.color,marginBottom:12}}>◈ REGISTRAR — {cfg.name}</div>

        {/* TIPO */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {["entrada","saida"].map(tp=>(
            <button key={tp} onClick={()=>F("type",tp)} style={{
              background:form.type===tp?(tp==="entrada"?G:COR):"transparent",
              color:form.type===tp?(tp==="entrada"?"#001a0b":"#fff"):(tp==="entrada"?G:COR),
              border:`1px solid ${tp==="entrada"?G:COR}`,borderRadius:8,padding:"10px",fontWeight:700,fontSize:12,transition:"all .15s"
            }}>
              {tp==="entrada"?"↑  ENTRADA / RECEITA":"↓  SAÍDA / GASTO"}
            </button>
          ))}
        </div>

        {/* CAMPOS */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div>
            <div style={{fontSize:10,color:MUT,marginBottom:4}}>Valor total (R$) *</div>
            <input type="number" placeholder="0,00" value={form.value} onChange={e=>F("value",e.target.value)} style={IS}/>
          </div>
          <div>
            <div style={{fontSize:10,color:MUT,marginBottom:4}}>Categoria *</div>
            <select value={form.category} onChange={e=>F("category",e.target.value)} style={IS}>
              <option value="">— selecionar —</option>
              {cats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>

        {/* QUANTIDADE (só saída - para mercadoria) */}
        {form.type==="saida"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div>
              <div style={{fontSize:10,color:MUT,marginBottom:4}}>Qtd peças (opcional)</div>
              <input type="number" placeholder="ex: 20 peças" value={form.quantity} onChange={e=>{F("quantity",e.target.value);calcVal(e.target.value,form.unitValue);}} style={IS}/>
            </div>
            <div>
              <div style={{fontSize:10,color:MUT,marginBottom:4}}>Valor unitário R$ (opcional)</div>
              <input type="number" placeholder="ex: 45,00 cada" value={form.unitValue} onChange={e=>{F("unitValue",e.target.value);calcVal(form.quantity,e.target.value);}} style={IS}/>
            </div>
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div>
            <div style={{fontSize:10,color:MUT,marginBottom:4}}>Pagamento</div>
            <select value={form.paymentMethod} onChange={e=>F("paymentMethod",e.target.value)} style={IS}>
              {PMETHODS.map(pm=><option key={pm} value={pm}>{pm}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:10,color:MUT,marginBottom:4}}>Data</div>
            <input type="date" value={form.date} onChange={e=>F("date",e.target.value)} style={IS}/>
          </div>
        </div>

        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,color:MUT,marginBottom:4}}>Descrição / observação</div>
          <input placeholder="Ex: 20 perfumes Rose com frete" value={form.description} onChange={e=>F("description",e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} style={IS}/>
        </div>

        {err&&<div style={{color:R,fontSize:11,marginBottom:8}}>{err}</div>}

        <button onClick={submit} style={{...GBtn(cfg.color,"12px 0"),width:"100%",fontSize:13}}>
          + Registrar {form.type==="entrada"?"Entrada":"Saída"}
        </button>

        {/* IA OPCIONAL */}
        <div style={{marginTop:10,borderTop:`1px solid ${BORD}`,paddingTop:10}}>
          <button onClick={()=>setShowAI(!showAI)} style={{background:"none",border:"none",color:MUT,fontSize:11}}>
            {showAI?"▲ fechar IA":"▼ usar IA (opcional — descreva em texto)"}
          </button>
          {showAI&&(
            <div style={{marginTop:8,display:"flex",gap:8}}>
              <input value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!aiLoad&&parseAI()} placeholder={`"comprei 50 perfumes por 800 pix hoje"`} style={{...IS,flex:1}}/>
              <button onClick={parseAI} disabled={aiLoad} style={{...GBtn(cfg.color,"9px 14px"),opacity:aiLoad?.6:1}}>{aiLoad?"...":"OK"}</button>
            </div>
          )}
        </div>
      </div>

      {/* HISTÓRICO */}
      <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${BORD}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,fontWeight:700}}>Histórico — {cfg.name}</span>
          <div style={{display:"flex",gap:6}}>
            {["todos","entrada","saida"].map(f=>(
              <button key={f} onClick={()=>setFilter(f)} style={GhBtn(filter===f?G:MUT,filter===f?G:BORD)}>
                {f==="todos"?"Todos":f==="entrada"?"Entradas":"Saídas"}
              </button>
            ))}
          </div>
        </div>
        {filtered.length===0
          ? <div style={{padding:32,textAlign:"center",color:MUT,fontSize:12}}>{txs.length===0?"Use o formulário acima para registrar!":"Sem resultados."}</div>
          : <div style={{maxHeight:400,overflowY:"auto"}}>
              {filtered.map(t=>(
                <div key={t.id} className="hr" style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:`1px solid ${BORD}18`,transition:"background .1s"}}>
                  <div style={{width:26,height:26,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,background:t.type==="entrada"?`${G}18`:`${COR}18`,color:t.type==="entrada"?G:COR,flexShrink:0}}>{t.type==="entrada"?"↑":"↓"}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.description||t.category||"—"}</div>
                    <div style={{fontSize:10,color:MUT,marginTop:1}}>{t.category} · {t.date?new Date(t.date+"T12:00:00").toLocaleDateString("pt-BR"):"—"} · {t.paymentMethod}</div>
                  </div>
                  <div style={{fontWeight:700,fontSize:13,color:t.type==="entrada"?G:COR,flexShrink:0}}>{t.type==="entrada"?"+":"-"}{fmt(t.value)}</div>
                  <button className="db" onClick={()=>onDel(t.id)} style={{background:`${R}18`,color:R,width:24,height:24,borderRadius:6,border:"none",fontSize:15,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   CUSTOS
══════════════════════════════════════════════════════ */
function CustosTab({txs,fixedCosts,onAddFixed,onDelFixed,onTogFixed,contingency,updCont,totalIn}){
  const [showForm,setShowForm]=useState(false);
  const [ff,setFF]=useState({name:"",value:"",category:FIX_CATS[0]});
  const [editC,setEditC]=useState(false);
  const [tmpC,setTmpC]=useState(contingency);
  const totalFixed=fixedCosts.filter(f=>f.active).reduce((a,f)=>a+f.value,0);
  const totalVar=txs.filter(t=>t.type==="saida").reduce((a,t)=>a+t.value,0);
  const contTarget=totalIn*(contingency.pct/100);
  const contPct=contTarget>0?Math.min(contingency.saved/contTarget*100,100):0;

  const addF=()=>{const v=parseFloat(ff.value);if(!ff.name||!v)return;onAddFixed({name:ff.name,value:v,category:ff.category,active:true});setFF({name:"",value:"",category:FIX_CATS[0]});setShowForm(false);};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {[{l:"Fixos/mês",v:totalFixed,c:COR,s:`${fixedCosts.filter(f=>f.active).length} ativos`},{l:"Variáveis",v:totalVar,c:YEL,s:"das operações"},{l:"Lucro real",v:totalIn-totalFixed-totalVar,c:(totalIn-totalFixed-totalVar)>=0?G:R}].map(s=>(
          <div key={s.l} style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,padding:"13px 14px"}}>
            <div style={{fontSize:9,color:MUT,marginBottom:3,letterSpacing:.4}}>{s.l.toUpperCase()}</div>
            <div style={{fontSize:18,fontWeight:700,color:s.c}}>{fmt(s.v)}</div>
            {s.s&&<div style={{fontSize:9,color:MUT,marginTop:3}}>{s.s}</div>}
          </div>
        ))}
      </div>

      {/* FIXOS */}
      <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${BORD}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:12,fontWeight:700}}>◎ Custos Fixos Mensais</div><div style={{fontSize:10,color:MUT,marginTop:2}}>total ativo: {fmt(totalFixed)}</div></div>
          <button onClick={()=>setShowForm(!showForm)} style={GBtn(COR,"7px 14px")}>+ Adicionar</button>
        </div>
        {showForm&&(
          <div style={{padding:"12px 14px",borderBottom:`1px solid ${BORD}`,background:CARD2,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <input placeholder="Nome (ex: Multilogin)" value={ff.name} onChange={e=>setFF(p=>({...p,name:e.target.value}))} style={IS}/>
            <input type="number" placeholder="Valor R$/mês" value={ff.value} onChange={e=>setFF(p=>({...p,value:e.target.value}))} style={IS}/>
            <select value={ff.category} onChange={e=>setFF(p=>({...p,category:e.target.value}))} style={IS}>{FIX_CATS.map(c=><option key={c}>{c}</option>)}</select>
            <button onClick={addF} style={{...GBtn(COR,"9px"),gridColumn:"1/3"}}>Salvar</button>
            <button onClick={()=>setShowForm(false)} style={{...GhBtn(),"padding":"9px"}}>Cancelar</button>
          </div>
        )}
        {fixedCosts.length===0
          ? <div style={{padding:24,textAlign:"center",color:MUT,fontSize:12}}>Adicione Multilogin, Net, etc.</div>
          : fixedCosts.map(f=>(
            <div key={f.id} className="hr" style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderBottom:`1px solid ${BORD}18`,opacity:f.active?1:.4,transition:"all .1s"}}>
              <button onClick={()=>onTogFixed(f.id)} style={{width:20,height:20,borderRadius:5,background:f.active?COR:"transparent",border:`2px solid ${f.active?COR:BORD}`,color:"#fff",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>{f.active?"✓":""}</button>
              <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500}}>{f.name}</div><div style={{fontSize:10,color:MUT,marginTop:1}}>{f.category}</div></div>
              <div style={{fontWeight:700,fontSize:13,color:COR}}>{fmt(f.value)}<span style={{fontSize:9,color:MUT}}>/mês</span></div>
              <button className="db" onClick={()=>onDelFixed(f.id)} style={{background:`${R}18`,color:R,width:24,height:24,borderRadius:6,border:"none",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          ))
        }
      </div>

      {/* CONTINGÊNCIA */}
      <div style={{background:CARD,border:`1px solid ${PUR}44`,borderRadius:12,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div><div style={{fontSize:12,fontWeight:700}}>◆ Reserva de Contingência</div><div style={{fontSize:10,color:MUT,marginTop:2}}>{contingency.pct}% do faturamento = {fmt(contTarget)}</div></div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:700,color:contPct>=100?G:PUR}}>{fmt(contingency.saved)}</div><div style={{fontSize:10,color:MUT}}>de {fmt(contTarget)}</div></div>
            <button onClick={()=>{setTmpC(contingency);setEditC(!editC);}} style={GhBtn(editC?PUR:MUT,editC?PUR:BORD)}>{editC?"fechar":"editar"}</button>
          </div>
        </div>
        <div style={{background:BORD,borderRadius:5,height:10,overflow:"hidden",marginBottom:6}}>
          <div style={{height:"100%",width:`${contPct}%`,background:`linear-gradient(90deg,${PUR},${BLU})`,borderRadius:5,transition:"width .5s"}}/>
        </div>
        <div style={{fontSize:10,color:MUT}}>{contPct.toFixed(0)}% formada · faltam {fmt(Math.max(0,contTarget-contingency.saved))}</div>
        {editC&&(
          <div style={{borderTop:`1px solid ${BORD}`,marginTop:12,paddingTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <div><div style={{fontSize:10,color:MUT,marginBottom:4}}>% do faturamento</div><input type="number" min="1" max="50" value={tmpC.pct} onChange={e=>setTmpC(p=>({...p,pct:+e.target.value}))} style={IS}/></div>
            <div><div style={{fontSize:10,color:MUT,marginBottom:4}}>Já reservado (R$)</div><input type="number" value={tmpC.saved} onChange={e=>setTmpC(p=>({...p,saved:+e.target.value}))} style={IS}/></div>
            <div style={{display:"flex",alignItems:"flex-end"}}><button onClick={()=>{updCont(tmpC);setEditC(false);}} style={{...GBtn(PUR,"10px"),width:"100%"}}>Salvar</button></div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   PRÓ-LABORE
══════════════════════════════════════════════════════ */
function ProlaboreTab({prolabore,updPL,onAdd,onDel}){
  const [editVal,setEditVal]=useState(false);
  const [tmpVal,setTmpVal]=useState(prolabore.monthly);
  const [form,setForm]=useState({description:"",value:"",category:PL_CATS[0],date:toDay(),paymentMethod:"Pix"});
  const F=(k,v)=>setForm(p=>({...p,[k]:v}));
  const total=prolabore.expenses.reduce((a,e)=>a+e.value,0);
  const disp=prolabore.monthly-total;
  const pct=prolabore.monthly>0?Math.min(total/prolabore.monthly*100,100):0;
  const cats=PL_CATS.map(c=>({name:c,value:prolabore.expenses.filter(e=>e.category===c).reduce((a,e)=>a+e.value,0)})).filter(c=>c.value>0);

  const add=()=>{const v=parseFloat(form.value);if(!v||!form.description.trim())return;onAdd({...form,value:v});setForm({description:"",value:"",category:PL_CATS[0],date:toDay(),paymentMethod:"Pix"});};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:`${YEL}14`,border:`1px solid ${YEL}44`,borderRadius:12,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div><div style={{fontSize:13,fontWeight:700,color:YEL}}>◇ Pró-labore Pessoal</div><div style={{fontSize:10,color:MUT,marginTop:2}}>seu salário — gaste sem tocar no caixa da empresa</div></div>
          <button onClick={()=>{setTmpVal(prolabore.monthly);setEditVal(!editVal);}} style={GhBtn(editVal?YEL:MUT,editVal?YEL:BORD)}>{editVal?"fechar":"alterar"}</button>
        </div>
        {editVal&&(
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input type="number" value={tmpVal} onChange={e=>setTmpVal(+e.target.value)} style={{...IS,flex:1}}/>
            <button onClick={()=>{updPL({...prolabore,monthly:tmpVal});setEditVal(false);}} style={GBtn(YEL,"10px 16px")}>Salvar</button>
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
          {[{l:"Pró-labore",v:prolabore.monthly,c:YEL},{l:"Gasto",v:total,c:pct>=90?R:pct>=70?COR:YEL},{l:"Disponível",v:Math.max(0,disp),c:disp>=0?G:R}].map(s=>(
            <div key={s.l} style={{background:"#0f0f0f44",borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontSize:9,color:MUT,marginBottom:3}}>{s.l.toUpperCase()}</div>
              <div style={{fontSize:15,fontWeight:700,color:s.c}}>{fmt(s.v)}</div>
            </div>
          ))}
        </div>
        <div style={{background:BORD,borderRadius:5,height:10,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:pct>=90?`linear-gradient(90deg,${YEL},${R})`:pct>=70?`linear-gradient(90deg,${YEL},${COR})`:`linear-gradient(90deg,${YEL},${G})`,borderRadius:5,transition:"width .5s"}}/>
        </div>
        {disp<0&&<div style={{fontSize:11,color:R,marginTop:8,background:`${R}12`,padding:"7px 10px",borderRadius:8}}>⚠ Passou {fmt(Math.abs(disp))} do pró-labore!</div>}
      </div>

      <div style={{background:CARD,border:`1px solid ${YEL}44`,borderLeft:`3px solid ${YEL}`,borderRadius:12,padding:"14px"}}>
        <div style={{fontSize:12,fontWeight:700,color:YEL,marginBottom:12}}>◇ ADICIONAR GASTO PESSOAL</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div><div style={{fontSize:10,color:MUT,marginBottom:4}}>Descrição *</div><input placeholder="Ex: almoço, uber..." value={form.description} onChange={e=>F("description",e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} style={IS}/></div>
          <div><div style={{fontSize:10,color:MUT,marginBottom:4}}>Valor (R$) *</div><input type="number" placeholder="0,00" value={form.value} onChange={e=>F("value",e.target.value)} style={IS}/></div>
          <div><div style={{fontSize:10,color:MUT,marginBottom:4}}>Categoria</div><select value={form.category} onChange={e=>F("category",e.target.value)} style={IS}>{PL_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
          <div><div style={{fontSize:10,color:MUT,marginBottom:4}}>Data</div><input type="date" value={form.date} onChange={e=>F("date",e.target.value)} style={IS}/></div>
        </div>
        <button onClick={add} style={{...GBtn(YEL,"11px 0"),width:"100%"}}>+ Adicionar Gasto Pessoal</button>
      </div>

      {cats.length>0&&(
        <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,padding:"14px"}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:10,color:MUT}}>POR CATEGORIA</div>
          {cats.map((c,i)=>{const p=total>0?c.value/total*100:0;const cls=[YEL,BLU,PUR,G,COR,MUT];return(
            <div key={c.name} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                <span style={{color:cls[i%cls.length]}}>{c.name}</span>
                <span style={{fontWeight:700}}>{fmt(c.value)} <span style={{color:MUT}}>({p.toFixed(0)}%)</span></span>
              </div>
              <div style={{background:BORD,borderRadius:3,height:4}}><div style={{height:"100%",width:`${p}%`,background:cls[i%cls.length],borderRadius:3}}/></div>
            </div>
          );})}
        </div>
      )}

      <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 14px",borderBottom:`1px solid ${BORD}`,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:12,fontWeight:700}}>Histórico pessoal</span>
          <span style={{fontSize:10,color:MUT}}>{prolabore.expenses.length} gastos</span>
        </div>
        {prolabore.expenses.length===0
          ? <div style={{padding:24,textAlign:"center",color:MUT,fontSize:12}}>Nenhum gasto pessoal registrado.</div>
          : <div style={{maxHeight:360,overflowY:"auto"}}>
              {prolabore.expenses.map(e=>(
                <div key={e.id} className="hr" style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:`1px solid ${BORD}18`,transition:"background .1s"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.description}</div>
                    <div style={{fontSize:10,color:MUT,marginTop:1}}>{e.category} · {e.date?new Date(e.date+"T12:00:00").toLocaleDateString("pt-BR"):"—"}</div>
                  </div>
                  <div style={{fontWeight:700,fontSize:13,color:YEL,flexShrink:0}}>-{fmt(e.value)}</div>
                  <button className="db" onClick={()=>onDel(e.id)} style={{background:`${R}18`,color:R,width:24,height:24,borderRadius:6,border:"none",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   TAREFAS
══════════════════════════════════════════════════════ */
function TasksTab({tasks,onAdd,onTog,onDel}){
  const [selDay,setSelDay]=useState(toDay());
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({title:"",priority:"media",time:"",notes:""});
  const [view,setView]=useState("dia");
  const isToday=selDay===toDay();
  const PRI={alta:{c:R,l:"Alta"},media:{c:YEL,l:"Média"},baixa:{c:BLU,l:"Baixa"}};
  const done=tasks.filter(t=>t.done).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  const overdue=tasks.filter(t=>!t.done&&t.date&&t.date<toDay());
  const todayT=tasks.filter(t=>t.date===toDay());

  const add=()=>{
    if(!form.title.trim())return;
    onAdd({...form,date:selDay,done:false});
    setForm({title:"",priority:"media",time:"",notes:""});setShowForm(false);
  };

  const TR=({t})=>{
    const over=!t.done&&t.date&&t.date<toDay();
    return(
      <div className="hr" style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 14px",borderBottom:`1px solid ${BORD}18`,opacity:t.done?.5:1,transition:"background .1s"}}>
        <button onClick={()=>onTog(t.id)} style={{width:20,height:20,borderRadius:5,background:t.done?G:"transparent",border:`2px solid ${t.done?G:BORD}`,color:"#001a0b",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>{t.done?"✓":""}</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:500,textDecoration:t.done?"line-through":"none",color:t.done?MUT:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
          <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:PRI[t.priority]?.c}}>● {PRI[t.priority]?.l}</span>
            {t.time&&<span style={{fontSize:10,color:MUT}}>⏰ {t.time}</span>}
            {over&&<span style={{fontSize:10,color:R,fontWeight:700}}>⚠ ATRASADO</span>}
            {view==="todas"&&t.date&&<span style={{fontSize:10,color:MUT}}>{fmtDay(t.date)}</span>}
          </div>
          {t.notes&&<div style={{fontSize:10,color:MUT,marginTop:3}}>{t.notes}</div>}
        </div>
        <button className="db" onClick={()=>onDel(t.id)} style={{background:`${R}18`,color:R,width:24,height:24,borderRadius:6,border:"none",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
      </div>
    );
  };

  const AddForm=()=>showForm?(
    <div style={{padding:12,borderBottom:`1px solid ${BORD}`,background:CARD2,display:"flex",flexDirection:"column",gap:8}}>
      <input placeholder="Título *" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&add()} style={IS} autoFocus/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <select value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))} style={{...IS,color:PRI[form.priority]?.c}}>
          <option value="alta">● Alta</option><option value="media">● Média</option><option value="baixa">● Baixa</option>
        </select>
        <input type="time" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))} style={IS}/>
      </div>
      <input placeholder="Notas (opcional)" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} style={IS}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={add} style={{...GBtn(G,"10px"),flex:1}}>Salvar para {isToday?"hoje":fmtDay(selDay)}</button>
        <button onClick={()=>setShowForm(false)} style={{...GhBtn(),"padding":"10px 14px"}}>Cancelar</button>
      </div>
    </div>
  ):null;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {[{l:"Produtividade",v:`${pct}%`,c:pct>=70?G:pct>=40?YEL:R},{l:"Hoje",v:todayT.length,c:BLU,s:`${todayT.filter(t=>t.done).length} feitas`},{l:"Pendentes",v:tasks.filter(t=>!t.done).length,c:MUT},{l:"Atrasadas",v:overdue.length,c:overdue.length>0?R:MUT}].map(s=>(
          <div key={s.l} style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:10,padding:"11px 12px"}}>
            <div style={{fontSize:9,color:MUT,marginBottom:3,letterSpacing:.4}}>{s.l.toUpperCase()}</div>
            <div style={{fontSize:18,fontWeight:700,color:s.c}}>{s.v}</div>
            {s.s&&<div style={{fontSize:9,color:MUT,marginTop:2}}>{s.s}</div>}
          </div>
        ))}
      </div>

      {tasks.length>0&&(
        <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:10,padding:"11px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:7}}><span style={{fontWeight:700}}>Progresso</span><span style={{color:pct>=70?G:YEL}}>{done}/{tasks.length}</span></div>
          <div style={{background:BORD,borderRadius:4,height:6}}><div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${G},${BLU})`,borderRadius:4,transition:"width .5s"}}/></div>
          {overdue.length>0&&<div style={{marginTop:8,fontSize:11,color:R,background:`${R}12`,padding:"6px 10px",borderRadius:8}}>⚠ {overdue.length} tarefa{overdue.length>1?"s":""} atrasada{overdue.length>1?"s":""}!</div>}
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:6}}>
          {[{id:"dia",l:"Por dia"},{id:"todas",l:"Todas"}].map(m=>(
            <button key={m.id} onClick={()=>setView(m.id)} style={GhBtn(view===m.id?G:MUT,view===m.id?G:BORD)}>{m.l}</button>
          ))}
        </div>
        <button onClick={()=>setShowForm(true)} style={GBtn(G,"8px 16px")}>+ Nova Tarefa</button>
      </div>

      {view==="dia"&&(
        <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"12px 14px",borderBottom:`1px solid ${BORD}`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <button onClick={()=>setSelDay(addDays(selDay,-1))} style={{...GhBtn(),"padding":"4px 12px",fontSize:18}}>‹</button>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:13,fontWeight:700,color:isToday?G:"#fff"}}>{isToday?"HOJE":fmtDay(selDay).toUpperCase()}</div>
                <div style={{fontSize:10,color:MUT,marginTop:2}}>{new Date(selDay+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"})}</div>
              </div>
              <button onClick={()=>setSelDay(addDays(selDay,1))} style={{...GhBtn(),"padding":"4px 12px",fontSize:18}}>›</button>
            </div>
            <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
              {[-2,-1,0,1,2].map(d=>{const ds=addDays(toDay(),d);const labs=["anteontem","ontem","hoje","amanhã","depois"];return(
                <button key={d} onClick={()=>setSelDay(ds)} style={{...GhBtn(selDay===ds?G:MUT,selDay===ds?G:BORD),fontSize:10,padding:"4px 9px"}}>{labs[d+2]}</button>
              );})}
            </div>
          </div>
          <AddForm/>
          {tasks.filter(t=>t.date===selDay).length===0
            ? <div style={{padding:"24px 0",textAlign:"center",color:MUT,fontSize:12}}>Nenhuma tarefa para {isToday?"hoje":fmtDay(selDay)}</div>
            : tasks.filter(t=>t.date===selDay).map(t=><TR key={t.id} t={t}/>)
          }
        </div>
      )}

      {view==="todas"&&(
        <div style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"11px 14px",borderBottom:`1px solid ${BORD}`,fontSize:12,fontWeight:700}}>Todas ({tasks.length})</div>
          <AddForm/>
          {tasks.length===0
            ? <div style={{padding:28,textAlign:"center",color:MUT,fontSize:12}}>Crie a primeira tarefa!</div>
            : [...tasks].sort((a,b)=>a.done===b.done?(a.date||"").localeCompare(b.date||""):(a.done?1:-1)).map(t=><TR key={t.id} t={t}/>)
          }
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   IA
══════════════════════════════════════════════════════ */
function IATab({txs,tasks,goals,fixedCosts,contingency,prolabore}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Olá! Consultora financeira aqui.\nTenho acesso a todas as suas operações, custos, pró-labore, metas e tarefas.\n\nO que quer analisar?"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);

  const ctx=()=>{
    const totalIn=txs.filter(t=>t.type==="entrada").reduce((a,t)=>a+t.value,0);
    const totalOut=txs.filter(t=>t.type==="saida").reduce((a,t)=>a+t.value,0);
    const totalFixed=fixedCosts.filter(f=>f.active).reduce((a,f)=>a+f.value,0);
    const plTotal=prolabore.expenses.reduce((a,e)=>a+e.value,0);
    const today=toDay();
    return`Dados (${new Date().toLocaleDateString("pt-BR")}):
Saldo: ${fmt(totalIn-totalOut)} | Fat: ${fmt(totalIn)} | Gastos: ${fmt(totalOut)}
Meta: mín ${fmt(goals.min)}, máx ${fmt(goals.max)}, atual ${fmt(totalIn)} (${goals.max>0?((totalIn/goals.max)*100).toFixed(0):0}%)
Ops: ${Object.values(OPS).map(o=>{const ot=txs.filter(t=>t.op===o.id);const i=ot.filter(t=>t.type==="entrada").reduce((a,t)=>a+t.value,0),s=ot.filter(t=>t.type==="saida").reduce((a,t)=>a+t.value,0);return`${o.name}: +${fmt(i)} -${fmt(s)}`;}).join(" | ")}
Fixos: ${fmt(totalFixed)} | Contingência: ${contingency.pct}% reservado ${fmt(contingency.saved)}
Pró-labore: ${fmt(prolabore.monthly)}/mês, gasto ${fmt(plTotal)}, disponível ${fmt(prolabore.monthly-plTotal)}
Tarefas: ${tasks.filter(t=>t.done).length}/${tasks.length} feitas, ${tasks.filter(t=>!t.done&&t.date&&t.date<today).length} atrasadas`;
  };

  const send=async()=>{
    if(!input.trim()||loading)return;
    const um={role:"user",content:input};
    setMsgs(p=>[...p,um]);setInput("");setLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:800,
        system:`Consultora financeira de PMEs brasileiras. Acesso completo:\n${ctx()}\nDireta, prática, empática. Português informal. Máx 300 palavras.`,
        messages:[...msgs,um].slice(-10).map(m=>({role:m.role,content:m.content}))
      })});
      const data=await res.json();
      setMsgs(p=>[...p,{role:"assistant",content:data.content?.filter(c=>c.type==="text").map(c=>c.text).join("")||"Erro."}]);
    }catch{setMsgs(p=>[...p,{role:"assistant",content:"Erro de conexão."}]);}
    setLoading(false);
  };

  const QUICK=["Como estão as 3 operações?","Meu pró-labore está ok?","Onde cortar custos?","Estou batendo a meta?"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 160px)",minHeight:460}}>
      <div ref={ref} style={{background:CARD,border:`1px solid ${BORD}`,borderRadius:"12px 12px 0 0",flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8,alignItems:"flex-start"}}>
            {m.role==="assistant"&&<div style={{width:24,height:24,background:G,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",color:"#001a0b",fontSize:11,fontWeight:700,flexShrink:0,marginTop:2}}>◆</div>}
            <div style={{background:m.role==="user"?G:CARD2,color:m.role==="user"?"#001a0b":"#fff",padding:"9px 13px",borderRadius:m.role==="user"?"12px 12px 0 12px":"12px 12px 12px 0",maxWidth:"80%",fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{m.content}</div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",gap:8}}><div style={{width:24,height:24,background:G,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",color:"#001a0b",fontSize:11,fontWeight:700,flexShrink:0}}>◆</div><div style={{background:CARD2,padding:"9px 13px",borderRadius:"12px 12px 12px 0",color:MUT,fontSize:12}}>Analisando...</div></div>}
      </div>
      {msgs.length<=2&&<div style={{background:CARD,borderLeft:`1px solid ${BORD}`,borderRight:`1px solid ${BORD}`,padding:"8px 10px",display:"flex",gap:6,flexWrap:"wrap"}}>{QUICK.map(q=><button key={q} onClick={()=>setInput(q)} style={{...GhBtn(BLU,`${BLU}40`),fontSize:10}}>{q}</button>)}</div>}
      <div style={{background:CARD,border:`1px solid ${BORD}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:10,display:"flex",gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&send()} placeholder="Pergunte sobre finanças, pró-labore, metas..." style={{...IS,flex:1}}/>
        <button onClick={send} disabled={loading} style={{...GBtn(G,"9px 16px"),opacity:loading?.6:1}}>{loading?"...":"Enviar"}</button>
      </div>
    </div>
  );
}

/* ── RENDER ─────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
